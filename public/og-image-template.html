<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
<div id="og-image" style="width: 1200px; height: 630px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); position: relative; overflow: hidden;">
  <!-- Decorative circles -->
  <div style="position: absolute; width: 300px; height: 300px; border-radius: 50%; background: #e94560; opacity: 0.1; top: -100px; left: -50px;"></div>
  <div style="position: absolute; width: 400px; height: 400px; border-radius: 50%; background: #0f3460; opacity: 0.3; bottom: -150px; right: -100px;"></div>

  <!-- Accent bar -->
  <div style="position: absolute; left: 60px; top: 200px; width: 8px; height: 200px; background: linear-gradient(180deg, #e94560, #0f3460);"></div>

  <!-- Title -->
  <div style="position: absolute; left: 100px; top: 220px;">
    <div style="font-size: 72px; font-weight: 800; color: #ffffff; letter-spacing: -0.02em;">POKOPIA</div>
    <div style="font-size: 36px; font-weight: 600; color: #e94560; margin-top: 10px;">PORTAL</div>
  </div>

  <!-- Subtitle -->
  <div style="position: absolute; left: 100px; top: 380px; font-size: 24px; color: #888888;">
    Guides • Pokemon Database • Habitat Maps • Recipes
  </div>

  <!-- Pokeball -->
  <div style="position: absolute; right: 150px; top: 100px; width: 180px; height: 180px;">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="#e94560"/>
      <rect x="5" y="47" width="90" height="6" fill="#1a1a2e"/>
      <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a2e" stroke-width="4"/>
      <circle cx="50" cy="50" r="15" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
    </svg>
  </div>

  <!-- Bottom accent -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(90deg, #e94560, #0f3460); opacity: 0.5;"></div>
</div>
</body>
</html>
